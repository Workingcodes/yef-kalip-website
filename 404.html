<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#1565C0" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayfa Bulunamadı – YEF KALIP</title>
  <meta name="robots" content="noindex, nofollow" />
  <style id="critical">
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--red:#1565C0;--red-dk:#0D47A1;--red-glow:rgba(21,101,192,0.25);--black:#0D0D0D;--steel:#1A1F28;--steel2:#222832;--steel3:#2A3040;--muted:#6B7A8D;--light:#CBD5E1;--white:#fff;--radius:5px;--nav-h:86px;--transition:0.25s ease}
  html{scroll-behavior:smooth;font-size:16px}
  body{font-family:'Inter',sans-serif;background:#0D0D0D;color:#CBD5E1;line-height:1.65;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif;font-weight:700;line-height:1.15;color:#fff}
  a{color:inherit;text-decoration:none}img{display:block;max-width:100%}ul{list-style:none}
  .container{max-width:1280px;margin:0 auto;padding:0 24px}
  .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:86px;display:flex;align-items:center;background:rgba(13,13,13,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05);transition:box-shadow .3s}
  .nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;gap:20px}
  .nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .nav-logo img{height:58px;width:58px;object-fit:contain;background:#fff;border-radius:8px;padding:4px}
  .nav-logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.2rem;line-height:1.1;color:#fff}
  .nav-logo-text small{font-size:.72rem;font-weight:400;color:#6B7A8D;letter-spacing:.05em;display:block}
  .nav-menu{display:flex;align-items:center;gap:2px;margin:0 auto}
  .nav-menu a{padding:8px 14px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.86rem;font-weight:600;color:rgba(255,255,255,.65);transition:all .25s ease}
  .nav-menu a:hover,.nav-menu a.active{color:#fff}.nav-menu a.active{color:#1565C0}
  .nav-cta a{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;background:#1565C0;color:#fff;transition:all .25s ease}
  .nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none}
  .nav-hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .25s ease;border:none}
  .btn-primary{background:#1565C0;color:#fff}.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.2)}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" />
  <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="css/style.css" /></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" type="image/jpeg" href="img/logo.jpg" />
  <style>
    .error-page { min-height: 100dvh; display: flex; align-items: center; justify-content: center; background: var(--black); text-align: center; padding: 40px 24px; }
    .error-code { font-family: 'Outfit', sans-serif; font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; line-height: 1; color: var(--steel2); letter-spacing: -0.04em; }
    .error-code span { color: var(--red); }
    .error-title { font-family: 'Outfit', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; color: var(--white); margin: 16px 0 12px; }
    .error-desc { font-size: 0.95rem; color: var(--muted); max-width: 420px; margin: 0 auto 36px; line-height: 1.7; }
    .error-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="error-page">
  <div>
    <div class="error-code"><span>4</span>0<span>4</span></div>
    <h1 class="error-title">Sayfa Bulunamadı</h1>
    <p class="error-desc">Aradığınız sayfa taşınmış veya kaldırılmış olabilir. Ana sayfaya dönerek devam edebilirsiniz.</p>
    <div class="error-links">
      <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Ana Sayfaya Dön</a>
      <a href="iletisim.html" class="btn btn-outline"><i class="fas fa-envelope"></i> İletişim</a>
    </div>
  </div>
</div>
</body>
</html>
