            "https://scontent-iad3-1.cdninstagram.com/v/t51.82787-15/627050086_18346331560228909_8564867710687082284_n.jpg?stp=dst-jpg_e35_s1080x1080_sh2.08_tt6&_nc_ht=scontent-iad3-1.cdninstagram.com&_nc_cat=101&_nc_oc=Q6cZ2gF1mdb5VanwiTaqAOVrFuYcsCH8z4iUSuabIb7reSSDLJCpPKYX7jAKt9Z93aSzA88&_nc_ohc=hgdeDb8c9lEQ7kNvwFLjbAs&_nc_gid=ZgHEqIsp4WYvsTgHnb3fWA&edm=AOQ1c0wBAAAA&ccb=7-5&ig_cache_key=MjA0MDE1NTE2ODcwMTIwOTIwMQ%3D%3D.3-ccb7-5&oh=00_Af9kql-xEGOBeUF1vLwGoqvEfCok_unPrEykiSuwOl3o2A&oe=6A2A7108&_nc_sid=8b3546"
            "https://scontent-iad3-2.cdninstagram.com/v/t51.82787-15/629376279_18406703713134503_968184318982027998_n.jpg?stp=dst-jpg_e35_s1080x1080_sh2.08_tt6&_nc_ht=scontent-iad3-2.cdninstagram.com&_nc_cat=111&_nc_oc=Q6cZ2gF1mdb5VanwiTaqAOVrFuYcsCH8z4iUSuabIb7reSSDLJCpPKYX7jAKt9Z93aSzA88&_nc_ohc=LEg5O_SxiRkQ7kNvwGvyMPj&_nc_gid=ZgHEqIsp4WYvsTgHnb3fWA&edm=AOQ1c0wBAAAA&ccb=7-5&ig_cache_key=MjA0MDE1NDk0NzA5MTAyNDcyNw%3D%3D.3-ccb7-5&oh=00_Af_EHoegS--AYeX0Q5jHzG71gGX_YqzovrevXYKjRR4udQ&oe=6A2A82CD&_nc_sid=8b3546"
            "https://scontent-iad3-1.cdninstagram.com/v/t51.82787-15/640047171_18560035084024972_3071074648393788291_n.jpg?stp=dst-jpg_e35_s1080x1080_sh2.08_tt6&_nc_ht=scontent-iad3-1.cdninstagram.com&_nc_cat=104&_nc_oc=Q6cZ2gF1mdb5VanwiTaqAOVrFuYcsCH8z4iUSuabIb7reSSDLJCpPKYX7jAKt9Z93aSzA88&_nc_ohc=nTs-5XH_W_AQ7kNvwHGSIt0&_nc_gid=ZgHEqIsp4WYvsTgHnb3fWA&edm=AOQ1c0wBAAAA&ccb=7-5&ig_cache_key=MjA0MDE1NDczNTc1Njk1NDUyMQ%3D%3D.3-ccb7-5&oh=00_Af_jkDrqyIa12e3kohJWS_3YsG6vjgud3UTgge9SMSI2_w&oe=6A2A78D4&_nc_sid=8b3546"
            "https://scontent-iad6-1.cdninstagram.com/v/t51.82787-15/636733425_18566154979022815_3165798722054765730_n.jpg?stp=dst-jpg_e35_s1080x1080_sh2.08_tt6&_nc_ht=scontent-iad6-1.cdninstagram.com&_nc_cat=107&_nc_oc=Q6cZ2gF1mdb5VanwiTaqAOVrFuYcsCH8z4iUSuabIb7reSSDLJCpPKYX7jAKt9Z93aSzA88&_nc_ohc=FJnQn2wgcfoQ7kNvwGkKsdE&_nc_gid=ZgHEqIsp4WYvsTgHnb3fWA&edm=AOQ1c0wBAAAA&ccb=7-5&ig_cache_key=MjA0MDE1NDM4MjY3MjAzOTQyNw%3D%3D.3-ccb7-5&oh=00_Af_rh4SyLozwXdKyV_qSY6TG0j3wX6JAc5kiCuvcuAasxA&oe=6A2A5079&_nc_sid=8b3546"
          )
          for i in "${!URLS[@]}"; do
            num=$((i+1))
            curl -L --max-time 30 -A "$UA" "${URLS[$i]}" -o "img/galeri/ig_${num}.jpg" \
              && echo "img $num OK" || echo "img $num failed"
          done

      - name: Install ffmpeg and download hero video
        continue-on-error: true
        run: |
          sudo apt-get install -y ffmpeg || true
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0"
          curl -L --max-time 90 -A "$UA" \
            "https://videos.pexels.com/video-files/27857021/12245078_3840_2160_60fps.mp4" \
            -o img/hero/hero_raw.mp4 || true
          if [ -s img/hero/hero_raw.mp4 ]; then
            ffmpeg -i img/hero/hero_raw.mp4 -t 10 -vf "scale=1280:720" \
              -c:v libx264 -crf 28 -preset fast -an -movflags +faststart \
              img/hero/hero.mp4 && rm img/hero/hero_raw.mp4 && echo "Video OK"
          else
            echo "No video downloaded - CSS background will be used"
          fi

      - name: List files
        run: |
          echo "=== img/ ===" && ls -lh img/ || true
          echo "=== img/galeri/ ===" && ls -lh img/galeri/ || true
          echo "=== img/hero/ ===" && ls -lh img/hero/ || true

      - name: Commit and push
        run: |
          git config user.email "nakosat@gmail.com"
          git config user.name "Workingcodes"
          git add img/
          git diff --staged --quiet || git commit -m "Add downloaded images, logo and hero video"
          git push origin main
