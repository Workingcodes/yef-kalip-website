name: Download Images & Video from CDN

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p img/galeri img/hero

      - name: Download logo (Instagram profile picture)
        run: |
          curl -L --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0" \
            "https://scontent-iad3-2.cdninstagram.com/v/t51.2885-19/60077842_286510325628327_5857779910738706432_n.jpg?stp=dst-jpg_s320x320_tt6&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby45NDUuYzIifQ&_nc_ht=scontent-iad3-2.cdninstagram.com&_nc_cat=103&_nc_oc=Q6cZ2gF1mdb5VanwiTaqAOVrFuYcsCH8z4iUSuabIb7reSSDLJCpPKYX7jAKt9Z93aSzA88&_nc_ohc=2f_tJ7_kSXgQ7kNvwF2Mxk6&_nc_gid=ZgHEqIsp4WYvsTgHnb3fWA&edm=AOQ1c0wBAAAA&ccb=7-5&oh=00_Af-uW4ci95W1GBMN6ZTzogxVgoJ6PwdLLMK52ukIM5xwLw&oe=6A2A57AF&_nc_sid=8b3546" \
            -o img/logo.jpg && echo "Logo OK" || echo "Logo failed"

